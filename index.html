<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>StyleHUb.</title>
</head>
<body>


    <!-- Nav Bar Creation -->
    
    <nav class="navbar" >


        <div class="menu-container" >
            <img src="images/icons/menu.png" alt="menu-icon">
        </div>


        <div class="logo-container" >
            <img src="images/products/logo.png" alt="StyleHub-Logo">
        </div>

        <div class="nav-links">
            
            
             <a href="#" > Home </a> 
             <a href="#" > Shop </a> 
             <a href="#" > Categories </a> 
             <a href="#" > About </a> 
             <a href="#" > Contact </a> 
            
        </div>

        <div class="option-container" >
            <a href="#" ><img src="images/icons/search.png" alt="search-icon"></a>
           <a href="#" ><img src="images/icons/circle-user-round.png" alt="user-icon"></a>
            <a href="#" ><img src="images/icons/shopping-cart.png" alt="cart-icon"></a>
        </div>

        <div class="cart-container" >
            <img src="images/icons/shopping-cart.png" alt="cart-icon">
        </div>


    </nav>

    <!-- hero section creation  -->

    <div class="hero-section" >


        <!-- hero section text area creation  -->

        <div class="text-section" >

            <p class="hero-title" > <span>|</span>NEW COLLECTION </p>

            <h1>Elevate Your Style, Every Day</h1>

            <p class="hero-description" >Discover the latest trends in fashion and lifestyle.<span>Shop your favorite looks now.</span></p>

            <div class="hero-buttons" >

                <button class="hero-btn1" >Shop Now</button>
                <button class="hero-btn2" >Explore Collection</button>

            </div>

        </div>

        <!-- hero section image area creation -->

        <div class="image-section" >

            <div class="image-bg" ></div>

            <div class="image-container" > <img src="images/products/hero.png" alt="hero-model-image" > </div>

        </div>

    </div>


</body>
</html>
